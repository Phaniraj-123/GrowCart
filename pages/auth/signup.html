<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>
    <div class="Login">
        <h2>Sign Up</h2>
        <input type="text" id="name" placeholder="Full Name"><br><br>
        <input type="email" id="email" placeholder="Email"><br><br>
        <input type="tel" id="mobile" placeholder="Mobile Number"><br><br>
        <input type="password" id="password" placeholder="Password"><br><br>
        <input type="password" id="confirmPassword" placeholder="Confirm Password"><br><br>
        <button onclick="signup()">Sign Up</button>
        <p id="error-msg" style="color:red;"></p>
        <p id="success-msg" style="color:green;"></p>
        <p>Already have an account? <a href="login.html">Login</a></p>
    </div>

    <script src="/userlogin/signup.js"></script>
</body>
</html>
